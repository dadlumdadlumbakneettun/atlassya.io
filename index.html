<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlassya - Çark Odası</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@400;700&family=Press+Start+2P&family=VT323&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --dark-purple: #1a0229;
            --neon-pink: #ff00ff;
            --glow-gold: rgba(255, 215, 0, 0.7);
            --hover-cyan: #019aa9;
            --text-teal: #368280;
            --btn-bg: #2a0e38;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a0229;
            font-family: 'Roboto', sans-serif;
            user-select: none;
            color: #fff;
        }

        #gameCanvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #blocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, rgba(26, 2, 41, 0.85) 0%, rgba(5, 0, 10, 0.97) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #instructions {
            text-align: center;
            cursor: pointer;
            border: 2px solid var(--gold);
            padding: 50px 60px;
            background: rgba(10, 0, 20, 0.7);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.15), inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        #instructions h1 {
            font-size: 42px;
            color: var(--gold);
            text-shadow: 0 0 20px var(--glow-gold), 2px 2px 0px #1a0229;
            letter-spacing: 6px;
            margin: 0 0 15px 0;
            font-family: 'Cinzel', serif;
        }

        #instructions p {
            font-size: 16px;
            color: #a080c0;
            margin: 8px 0;
            letter-spacing: 1px;
        }

        #instructions .hint {
            font-size: 13px;
            color: #604080;
            margin-top: 20px;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background-color: rgba(255, 215, 0, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 0 6px rgba(255, 215, 0, 0.3);
        }

        #interactText {
            position: absolute;
            top: 56%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--gold);
            text-shadow: 1px 1px 2px #000;
            display: none;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 3px;
            font-family: 'Press Start 2P', cursive;
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 6px 16px;
            background: rgba(0, 0, 0, 0.5);
        }

        #vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0) 45%, rgba(5, 0, 10, 0.75) 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* WHEEL SPIN OVERLAY - appears when clicking the wheel in 3D */
        #wheelSpinOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .wheel-spin-title {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: var(--gold);
            text-shadow: 0 0 15px var(--glow-gold);
            margin-bottom: 10px;
            animation: text-flicker 2s infinite alternate;
        }

        @keyframes text-flicker {

            0%,
            100% {
                opacity: 1;
                text-shadow: 0 0 5px var(--glow-gold), 0 0 10px var(--glow-gold), 0 0 20px var(--glow-gold);
            }

            50% {
                opacity: 0.8;
                text-shadow: 0 0 5px var(--glow-gold);
            }
        }

        .wheel-container {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: #1a0505;
            border-radius: 50%;
            padding: 15px;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.3), inset 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: grab;
        }

        .wheel-container:active {
            cursor: grabbing;
        }

        #wheelCanvas {
            border-radius: 50%;
            border: 8px solid var(--gold);
            box-shadow: 0 0 25px var(--glow-gold) inset;
            pointer-events: none;
        }

        .wheel-hub {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border-radius: 50%;
            border: 4px solid #b8860b;
            box-shadow: 0 0 25px var(--glow-gold) inset, 0 0 15px #000;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
        }

        .eyelid-top,
        .eyelid-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: var(--dark-purple);
            z-index: 4;
            transition: height 0.1s ease-in-out;
        }

        .eyelid-top {
            top: 0;
            border-bottom: 2px solid #000;
        }

        .eyelid-bottom {
            bottom: 0;
            border-top: 2px solid #000;
        }

        .wheel-hub.blink .eyelid-top {
            height: 50%;
        }

        .wheel-hub.blink .eyelid-bottom {
            height: 50%;
        }

        .eye-iris {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #4facfe 0%, #00f2fe 80%, #003366 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
            z-index: 2;
        }

        .eye-iris::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            background: #000;
            border-radius: 50%;
        }

        .eye-shine {
            position: absolute;
            top: 20%;
            left: 25%;
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 50px solid var(--gold);
            z-index: 10;
            filter: drop-shadow(0 0 10px var(--glow-gold));
            pointer-events: none;
        }

        .drag-hint {
            color: var(--gold);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            text-align: center;
            margin-top: 15px;
            opacity: 0.6;
            animation: blink-hint 2s infinite;
            letter-spacing: 1px;
        }

        @keyframes blink-hint {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.7;
            }
        }

        .close-spin-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            background: none;
            border: none;
            color: #fff;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 210;
            transition: transform 0.2s;
        }

        .close-spin-btn:hover {
            transform: scale(1.2);
            color: var(--gold);
        }

        /* RESULT */
        #resultDisplay {
            margin-top: 15px;
            width: 90%;
            max-width: 950px;
            text-align: center;
            display: none;
            perspective: 1000px;
            position: relative;
            z-index: 500;
        }

        #resultDisplay.show-result {
            display: block
        }

        .game-info {
            position: relative;
            padding: 25px;
            background: rgba(26, 2, 41, 0.95);
            border: 4px solid var(--gold);
            border-radius: 10px;
            box-shadow: 0 0 30px var(--glow-gold);
            max-height: 60vh;
            overflow-y: auto;
        }

        .game-info h2 {
            color: var(--gold);
            text-shadow: 0 0 10px var(--glow-gold);
            margin-top: 0;
            font-size: 2rem;
            margin-bottom: 15px
        }

        .result-content-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start
        }

        .result-game-details {
            text-align: left;
            flex-grow: 1
        }

        .result-game-image {
            width: 350px;
            height: auto;
            border: 3px solid var(--gold);
            border-radius: 8px;
            box-shadow: 0 0 15px var(--glow-gold);
            flex-shrink: 0
        }

        .close-result-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
            opacity: 0.7;
            z-index: 1002
        }

        .close-result-btn:hover {
            opacity: 1;
            transform: scale(1.1)
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-10vh) rotateZ(0deg);
                opacity: 1
            }

            100% {
                transform: translateY(110vh) rotateZ(720deg);
                opacity: 0
            }
        }

        .confetti {
            position: absolute;
            background-color: var(--gold);
            opacity: 0;
            animation-name: confetti-fall;
            animation-timing-function: linear;
            animation-fill-mode: forwards
        }

        /* SETTINGS */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .settings-content {
            background: #1a0229;
            border: 4px solid var(--gold);
            padding: 30px;
            width: 700px;
            max-width: 95%;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            position: relative;
            box-shadow: 0 0 30px var(--glow-gold);
            max-height: 90vh;
            overflow-y: auto;
        }

        .settings-content h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px var(--glow-gold);
        }

        .setting-group {
            margin-bottom: 18px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .setting-title {
            font-weight: bold;
            color: var(--neon-pink);
            margin-bottom: 10px;
            display: block;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.75rem;
        }

        .radio-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .radio-option {
            position: relative;
            flex-grow: 1;
        }

        .radio-option input[type="radio"],
        .radio-option input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--btn-bg);
            border: 2px solid #555;
            padding: 10px 8px;
            cursor: pointer;
            font-weight: bold;
            color: #aaa;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #000;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            font-size: 0.8rem;
        }

        .radio-option input:checked+label {
            background-color: var(--gold);
            color: #1a0229;
            border-color: #fff;
            box-shadow: 0 0 15px var(--glow-gold);
            transform: translateY(2px);
        }

        .radio-option label:hover {
            border-color: var(--hover-cyan);
            color: #fff;
        }

        .close-settings-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
        }

        .close-settings-btn:hover {
            transform: scale(1.2);
            color: var(--gold);
        }

        .back-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            background: linear-gradient(135deg, #8b0000, #4a0000);
            color: var(--gold);
            border: 2px solid var(--gold);
            cursor: pointer;
            text-align: center;
            letter-spacing: 2px;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #b00, #6a0000);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .volume-control-container {
            width: 100%;
            margin-top: 8px;
            padding: 0 10px;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 22px;
            width: 22px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            margin-top: -8px;
            border: 2px solid #fff;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
        }

        /* GAME OVERLAYS */
        .game-display-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1002;
            overflow-y: auto;
            padding: 20px;
        }

        .game-display-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 40px auto
        }

        .game-item {
            position: relative;
            text-align: center;
            color: #fff;
            width: 280px;
            cursor: pointer;
        }

        .game-item:hover {
            transform: scale(1.05);
            transition: transform 0.2s;
        }

        .game-item img.game-thumb {
            width: 280px;
            height: 130px;
            border: 3px solid var(--gold);
            border-radius: 5px;
            margin-bottom: 10px;
            object-fit: cover;
            display: block;
        }

        .game-item .game-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--gold);
        }

        .close-overlay-btn {
            position: fixed;
            top: 20px;
            right: 30px;
            background: none;
            border: none;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 1003
        }

        .heart-overlay {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 35px;
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 0 3px rgba(0, 0, 0, 0.8));
            pointer-events: none;
        }

        .overlay-icon {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 50px;
            height: auto;
            z-index: 15;
            filter: drop-shadow(2px 2px 2px black);
        }

        #detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 10010;
            justify-content: center;
            align-items: center;
        }

        .detail-content {
            background: #1a0229;
            border: 4px solid var(--gold);
            padding: 30px;
            width: 500px;
            max-width: 90%;
            color: #fff;
            position: relative;
            box-shadow: 0 0 30px var(--glow-gold);
            text-align: center;
        }

        .detail-content h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .detail-content p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 10px 0;
            color: #ddd;
        }

        .detail-content strong {
            color: var(--hover-cyan);
        }

        .close-detail-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }

        /* DICE */
        #dice-interface {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.9);
        }

        .dice-table {
            width: 300px;
            height: 200px;
            background: linear-gradient(135deg, #2a1808, #1a0e05);
            border: 3px solid #4a2e10;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 20px;
        }

        .dice-area {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #666;
            border-radius: 5px;
            position: relative;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #fff, #ccc);
            border-radius: 50%;
            position: absolute;
            display: none;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.5);
        }

        .p-1 {
            top: 5px;
            left: 5px;
        }

        .p-2 {
            top: 22px;
            left: 5px;
        }

        .p-3 {
            top: 39px;
            left: 5px;
        }

        .p-4 {
            top: 22px;
            left: 22px;
        }

        .p-5 {
            top: 5px;
            left: 39px;
        }

        .p-6 {
            top: 22px;
            left: 39px;
        }

        .p-7 {
            top: 39px;
            left: 39px;
        }

        #roll-btn {
            margin: 20px auto;
            padding: 15px 40px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            background: #4a0e5a;
            color: var(--gold);
            border: 4px solid var(--gold);
            cursor: pointer;
            box-shadow: 0 5px 0 #1a0229;
        }

        #roll-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a0229;
        }

        #diceResultText {
            text-align: center;
            color: var(--gold);
            font-family: 'Press Start 2P', cursive;
            margin-top: 15px;
            font-size: 1.3rem;
            text-shadow: 2px 2px #000;
            min-height: 2rem;
        }

        ::-webkit-scrollbar {
            width: 10px
        }

        ::-webkit-scrollbar-track {
            background: #1a0229
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 5px
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>

<body>
    <div id="blocker">
        <div id="instructions">
            <h1>ATLASSYA</h1>
            <p>Çark Odasına Girmek İçin Tıkla</p>
            <p class="hint">Hareket: W A S D &nbsp;|&nbsp; Etkileşim: Tıklama &nbsp;|&nbsp; Ayarlar: ESC</p>
        </div>
    </div>
    <div id="crosshair"></div>
    <div id="interactText">[ TIKLA ]</div>
    <div id="vignette"></div>
    <div id="gameCanvas"></div>

    <!-- WHEEL SPIN OVERLAY -->
    <div id="wheelSpinOverlay">
        <button class="close-spin-btn" id="closeSpinOverlay">&times;</button>
        <div class="wheel-spin-title">ATLASSYA</div>
        <div class="wheel-container" id="wheelContainerEl">
            <div class="pointer"></div>
            <div class="wheel-hub" id="hubElement">
                <div class="eye-iris">
                    <div class="eye-shine"></div>
                </div>
                <div class="eyelid-top"></div>
                <div class="eyelid-bottom"></div>
            </div>
            <canvas id="wheelCanvas" width="380" height="380"></canvas>
        </div>
        <div class="drag-hint">▲ ÇARKI FAREYLE TUTUP ÇEVİR ▲</div>
        <div id="resultDisplay">
            <div class="game-info"><button id="closeResultButton" class="close-result-btn">&times;</button></div>
        </div>
        <div class="confetti-container" id="confetti-container"></div>
    </div>

    <!-- OVERLAYS -->
    <div class="game-display-overlay" id="wishlistOverlay"><button class="close-overlay-btn"
            id="closeWishlist">&times;</button>
        <div class="game-display-content" id="wishlistContent"></div>
    </div>
    <div class="game-display-overlay" id="completedOverlay"><button class="close-overlay-btn"
            id="closeCompleted">&times;</button>
        <div class="game-display-content" id="completedContent"></div>
    </div>
    <div class="game-display-overlay" id="currentWheelOverlay"><button class="close-overlay-btn"
            id="closeCurrentWheel">&times;</button>
        <div class="game-display-content" id="currentWheelContent"></div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-modal">
        <div class="settings-content">
            <button class="close-settings-btn" id="closeSettings">&times;</button>
            <h2>AYARLAR</h2>
            <div class="setting-group"><span class="setting-title">SES EFEKTLERİ</span>
                <div class="radio-options">
                    <div class="radio-option"><input type="radio" name="opt_sound" value="on" checked
                            id="sound_on"><label for="sound_on">AÇIK</label></div>
                    <div class="radio-option"><input type="radio" name="opt_sound" value="off" id="sound_off"><label
                            for="sound_off">KAPALI</label></div>
                </div>

        // COLLISION
        function isInBounds(x, z) {
            const p = 0.6;
            // Main corridor
            if (x >= -HW + p && x <= HW - p && z >= 6 - ML + p && z <= 6 - p) return true;
            // Branch corridor
            if (x >= HW && x <= HW + BL - p && z >= 6 - ML + p && z <= 6 - ML + CW - p) return true;
            // Door passage
            if (x >= -HW && x >= WR.x1 - 0.5 && z >= DOOR_Z1 + p && z <= DOOR_Z2 - p && x >= -HW - 1) return true;
            // Wheel room
            if (x <= WR.x1 - p + 1 && x >= WR.x2 + p && z >= WR.z1 + p && z <= WR.z2 - p) return true;
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameState !== 'CORRIDOR') {
                // Eye still tracks player even when not in corridor
                if (eyeMesh) eyeMesh.lookAt(camera.position);
                renderer.render(scene, camera); return;
            }
            const time = performance.now();
            if (controls.isLocked) {
                const dt = (time - prevTime) / 1000;
                if (Math.random() > 0.988) scene.userData.mainLight.intensity = 0.4 + Math.random() * 0.9;
                velocity.x -= velocity.x * 10 * dt; velocity.z -= velocity.z * 10 * dt; velocity.y -= 40 * dt;
                direction.z = Number(moveForward) - Number(moveBackward); direction.x = Number(moveRight) - Number(moveLeft); direction.normalize();
                if (moveForward || moveBackward) velocity.z -= direction.z * 50 * dt;
                if (moveLeft || moveRight) velocity.x -= direction.x * 50 * dt;
                const oldX = controls.getObject().position.x, oldZ = controls.getObject().position.z;
                controls.moveRight(-velocity.x * dt); controls.moveForward(-velocity.z * dt);
                controls.getObject().position.y += (velocity.y * dt);
                if (controls.getObject().position.y < H) { velocity.y = 0; controls.getObject().position.y = H; canJump = true; }
                // Collision check
                const pos = controls.getObject().position;
                if (!isInBounds(pos.x, pos.z)) { pos.x = oldX; pos.z = oldZ; velocity.x = 0; velocity.z = 0; }
                // Eye tracks player
                if (eyeMesh) eyeMesh.lookAt(camera.position);
                // Raycaster for interaction
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const hits = raycaster.intersectObjects(objects);
                if (hits.length > 0 && hits[0].distance < 4) {
                    interactTarget = hits[0].object; interactText.style.display = 'block';
                    const ud = interactTarget.userData;
                    if (ud.type === 'WHEEL') interactText.innerText = '[ ÇARKI ÇEVİR ]';
                    else if (ud.title) interactText.innerText = `[ ${ud.title} ]`;
                    else interactText.innerText = '[ TIKLA ]';
                } else { interactTarget = null; interactText.style.display = 'none'; }
            }
            prevTime = time; renderer.render(scene, camera);
        }

        // ===== WHEEL LOGIC =====
        let availableGames = [], luckyBonus = 0, currentRotation = 0;
        const colors = ['#b31010', '#1a1a1a'];
        const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d');
        const resultDisplay = document.getElementById('resultDisplay'), gameInfoContainer = resultDisplay.querySelector('.game-info');

        function drawWheel() {
            const n = availableGames.length;
            if (!n) { ctx.clearRect(0, 0, 380, 380); ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(190, 190, 170, 0, 2 * Math.PI); ctx.fill(); ctx.fillStyle = '#fff'; ctx.font = '20px Roboto'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('Oyun Kalmadı!', 190, 190); return; }
            const a = 2 * Math.PI / n; ctx.clearRect(0, 0, 380, 380);
            for (let i = 0; i < n; i++) { ctx.beginPath(); ctx.moveTo(190, 190); ctx.arc(190, 190, 190, i * a, (i + 1) * a); ctx.closePath(); ctx.fillStyle = colors[i % 2]; ctx.fill(); ctx.strokeStyle = '#c49102'; ctx.lineWidth = 2; ctx.stroke(); ctx.save(); ctx.translate(190, 190); ctx.rotate(i * a + a / 2); ctx.textAlign = 'right'; ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.fillText(i, 170, 5); ctx.restore(); }
        }

        function initDragSpin() {
            const wc = document.getElementById('wheelContainerEl');
            let isDragging = false, startAngle = 0, lastAngle = 0, angVel = 0, lastTime = 0, spinning = false;
            function getAngle(e) { const r = wc.getBoundingClientRect(); const cx = r.left + r.width / 2, cy = r.top + r.height / 2; return Math.atan2((e.clientY || e.touches[0].clientY) - cy, (e.clientX || e.touches[0].clientX) - cx) * 180 / Math.PI; }
            wc.addEventListener('mousedown', e => { if (spinning) return; isDragging = true; startAngle = getAngle(e) - currentRotation; lastAngle = getAngle(e); lastTime = Date.now(); angVel = 0; e.preventDefault(); });
            wc.addEventListener('touchstart', e => { if (spinning) return; isDragging = true; startAngle = getAngle(e) - currentRotation; lastAngle = getAngle(e); lastTime = Date.now(); angVel = 0; e.preventDefault(); }, { passive: false });
            const mv = e => { if (!isDragging) return; e.preventDefault(); const a = getAngle(e), now = Date.now(), dt = now - lastTime; if (dt > 0) angVel = (a - lastAngle) / dt * 16; currentRotation = a - startAngle; canvas.style.transform = `rotate(${currentRotation}deg)`; lastAngle = a; lastTime = now; };
            document.addEventListener('mousemove', mv); document.addEventListener('touchmove', mv, { passive: false });
            const up = () => { if (!isDragging) return; isDragging = false; if (Math.abs(angVel) > 2) { spinning = true; fling(angVel, () => { spinning = false; }); } };
            document.addEventListener('mouseup', up); document.addEventListener('touchend', up);

            function fling(vel, cb) {
                if (availableGames.length < 1) { cb(); return; } playSound('click');
                const ti = selectTarget(), n = availableGames.length, sd = 360 / n;
                const sign = vel > 0 ? 1 : -1, extra = 360 * (3 + Math.floor(Math.random() * 3)) * sign;
                let tgt = (270 - (ti * sd) + 360) % 360, cur = ((currentRotation % 360) + 360) % 360, dist = ((tgt - cur + 360) % 360);
                if (sign < 0) dist = -(360 - dist);
                const total = extra + dist, start = currentRotation, final = start + total;
                let st = null; const dur = 6000; let ltk = Math.floor(currentRotation / sd);
                function anim(ts) {
                    if (!st) st = ts; const el = ts - st, p = Math.min(el / dur, 1), ease = 1 - Math.pow(1 - p, 4);
                    currentRotation = start + (total * ease); canvas.style.transform = `rotate(${currentRotation}deg)`;
                    if (wheelDiscMesh) wheelDiscMesh.rotation.y = currentRotation * Math.PI / 180;
                    const ct = Math.floor(Math.abs(currentRotation) / sd); if (ct > ltk) { playSound('tick'); ltk = ct; }
                    if (p < 1) requestAnimationFrame(anim); else { currentRotation = final; canvas.style.transform = `rotate(${currentRotation}deg)`; displayResult(availableGames[ti]); cb(); }
                }
                requestAnimationFrame(anim);
            }
        }
        function selectTarget() { const fd = sessionStorage.getItem('atlassya_first_spin_done'); if (!fd) { sessionStorage.setItem('atlassya_first_spin_done', '1'); const si = availableGames.findIndex(g => g.name.toLowerCase() === 'the stalked 2'); if (si !== -1) return si; } if (luckyBonus > 0) { const fi = []; availableGames.forEach((g, i) => { if (favoriteGames.includes(g.name)) fi.push(i); }); if (fi.length > 0 && Math.random() < 0.5) return fi[Math.floor(Math.random() * fi.length)]; } return Math.floor(Math.random() * availableGames.length); }

        // ===== GAME HELPERS =====
        function getImg(g) { if (g.image) return g.image; if (g.steamId && !isNaN(g.steamId)) return `https://cdn.cloudflare.steamstatic.com/steam/apps/${g.steamId}/header.jpg`; return `https://via.placeholder.com/460x215/1a0229/FFD700?text=${encodeURIComponent(g.name)}`; }
        function displayResult(g) { playSound('click'); gameInfoContainer.innerHTML = `<button id="closeResultButton" class="close-result-btn">&times;</button><div class="result-content-wrapper"><img src="${getImg(g)}" class="result-game-image" onerror="this.src='https://via.placeholder.com/400x200?text=Resim+Yok'"><div class="result-game-details"><h2>${g.name}</h2><p><strong>Türü:</strong> ${g.type}</p><p><strong>Çıkış:</strong> ${g.releaseDate}</p><p><strong>Süre:</strong> ${g.playtime}</p><p>${g.description}</p></div></div>`; document.getElementById('closeResultButton').addEventListener('click', () => { playSound('click'); resultDisplay.classList.remove('show-result'); }); resultDisplay.classList.add('show-result'); for (let i = 0; i < 100; i++) { const c = document.createElement('div'); c.className = 'confetti'; c.style.left = Math.random() * 100 + 'vw'; c.style.animationDuration = (Math.random() * 2 + 3) + 's'; c.style.animationDelay = (Math.random() * 2) + 's'; c.style.width = c.style.height = (Math.random() > 0.5 ? '10px' : '12px'); if (Math.random() > 0.5) c.style.borderRadius = '50%'; document.getElementById('confetti-container').appendChild(c); setTimeout(() => c.remove(), 5000); } }

        function showGameDetails(g) { playSound('click'); document.getElementById('detailTitle').innerText = g.name; document.getElementById('detailType').innerText = g.type || 'Bilinmiyor'; document.getElementById('detailTime').innerText = g.playtime || 'Bilinmiyor'; document.getElementById('detailDesc').innerText = g.description || 'Açıklama yok.'; document.getElementById('detail-modal').style.display = 'flex'; }
        document.getElementById('closeDetail').addEventListener('click', () => { playSound('click'); document.getElementById('detail-modal').style.display = 'none'; });

        function openOverlay(oid, cid, list) { const c = document.getElementById(cid); c.innerHTML = ''; list.forEach(g => { let oi = g.overlayIcon ? `<img src="${g.overlayIcon}" class="overlay-icon">` : ''; c.innerHTML += `<div class="game-item">${oi}<img src="${getImg(g)}" class="game-thumb"/><div class="game-name">${g.name}</div></div>`; }); document.getElementById(oid).style.display = 'block'; }
        function openCurrentWheel() { const c = document.getElementById('currentWheelContent'); c.innerHTML = ''; availableGames.forEach(g => { const h = favoriteGames.includes(g.name) ? `<img class="heart-overlay" src="https://cdn-icons-png.flaticon.com/512/833/833472.png" alt="fav">` : ''; const d = document.createElement('div'); d.className = 'game-item'; d.innerHTML = `${h}<img class="game-thumb" src="${getImg(g)}"/><div class="game-name">${g.name}</div>`; d.addEventListener('click', () => showGameDetails(g)); c.appendChild(d); }); document.getElementById('currentWheelOverlay').style.display = 'block'; }

        // ===== SETTINGS & FILTERS =====
        function gRV(n) { for (let r of document.getElementsByName(n)) if (r.checked) return r.value; return 'all'; }
        function pDur(d) { const l = d.toLowerCase(); if (l.includes('sonsuz')) return 999; const m = l.match(/[\d\.]+/g); if (m) { const n = m.map(v => parseFloat(v)), mx = Math.max(...n); if (l.includes('dakika') && mx > 10) return mx / 60; return mx; } return 0; }
        function isA(g) { return g.type.toLowerCase().includes('anomali'); }
        function isJ(g) { return g.type.toLowerCase().includes('japon'); }
        function isD(g) { return g.type.toLowerCase().includes('demo') || g.releaseDate.toLowerCase().includes('demo'); }
        function updateAvailableGames() {
            const ao = gRV('opt_anomaly'), jo = gRV('opt_japan'), dm = gRV('opt_demo'), fo = gRV('opt_fav');
            const st = Array.from(document.querySelectorAll('input[name="opt_time"]:checked')).map(c => c.value);
            let f = games.filter(g => { const d = pDur(g.playtime); if (fo === 'only' && !favoriteGames.includes(g.name)) return false; if (ao === 'exclude' && isA(g)) return false; if (jo === 'exclude' && isJ(g)) return false; if (dm === 'exclude' && isD(g)) return false; if (st.length > 0) { let m = false; if (st.includes('short') && d < 1) m = true; if (st.includes('medium') && d >= 1 && d <= 2) m = true; if (st.includes('long') && d > 2) m = true; if (!m) return false; } return true; });
            const af = []; if (ao === 'only') af.push('a'); if (jo === 'only') af.push('j'); if (dm === 'only') af.push('d');
            if (af.length > 0) f = f.filter(g => { let m = false; if (af.includes('a') && isA(g)) m = true; if (af.includes('j') && isJ(g)) m = true; if (af.includes('d') && isD(g)) m = true; return m; });
            availableGames = f; drawWheel();
        }
        const settingsModal = document.getElementById('settings-modal');
        document.getElementById('closeSettings').addEventListener('click', () => { playSound('click'); settingsModal.style.display = 'none'; });
        document.getElementById('backToCorridor').addEventListener('click', returnToRoom);
        document.querySelectorAll('input[type="radio"],input[type="checkbox"]').forEach(r => { r.addEventListener('change', () => { playSound('click'); if (r.name === 'opt_sound') soundEnabled = (r.value === 'on'); else updateAvailableGames(); }); });

        // ESC
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (gameState !== 'CORRIDOR') {
                    let closed = false;
                    document.querySelectorAll('.game-display-overlay').forEach(o => { if (o.style.display === 'block') { o.style.display = 'none'; closed = true; } });
                    if (resultDisplay.classList.contains('show-result')) { resultDisplay.classList.remove('show-result'); closed = true; }
                    if (document.getElementById('detail-modal').style.display === 'flex') { document.getElementById('detail-modal').style.display = 'none'; closed = true; }
                    if (document.getElementById('dice-interface').style.display === 'flex') { document.getElementById('dice-interface').style.display = 'none'; closed = true; }
                    if (settingsModal.style.display === 'flex') { settingsModal.style.display = 'none'; closed = true; }
                    else if (!closed) { settingsModal.style.display = 'flex'; return; }
                    if (closed && document.getElementById('wheelSpinOverlay').style.display !== 'flex') { gameState = 'CORRIDOR'; controls.lock(); }
                }
            }
        });

        // DICE
        document.getElementById('roll-btn').addEventListener('click', () => {
            playSound('click'); const btn = document.getElementById('roll-btn'); btn.disabled = true; btn.innerText = 'ATILIYOR...';
            const dotP = { 1: ['.p-4'], 2: ['.p-1', '.p-7'], 3: ['.p-1', '.p-4', '.p-7'], 4: ['.p-1', '.p-5', '.p-3', '.p-7'], 5: ['.p-1', '.p-5', '.p-3', '.p-7', '.p-4'], 6: ['.p-1', '.p-2', '.p-3', '.p-5', '.p-6', '.p-7'] };
            function sn(id, n) { const d = document.getElementById(id); d.querySelectorAll('.dot').forEach(x => x.style.display = 'none'); dotP[n].forEach(s => d.querySelector(s).style.display = 'block'); }
            const iv = setInterval(() => { sn('dice-1', Math.floor(Math.random() * 6) + 1); sn('dice-2', Math.floor(Math.random() * 6) + 1); }, 80);
            setTimeout(() => {
                clearInterval(iv); const f1 = Math.floor(Math.random() * 6) + 1, f2 = Math.floor(Math.random() * 6) + 1; sn('dice-1', f1); sn('dice-2', f2);
                luckyBonus = (f1 + f2) * 2; document.getElementById('diceResultText').innerText = `ŞANSIN %${luckyBonus} ARTTI!`;
                setTimeout(() => { document.getElementById('dice-interface').style.display = 'none'; gameState = 'CORRIDOR'; controls.lock(); }, 1500);
            }, 700);
        });

        // ===== START =====
        init(); animate();


    </script>
</body>

</html>
