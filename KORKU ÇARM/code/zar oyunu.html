<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piksel Zar Oyunu</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .game-wrapper {
            position: relative;
            width: 507px; 
            height: 507px;
        }

        .table-bg {
            width: 100%;
            height: 100%;
            background-image: url('masa.png');
            background-size: cover;
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border-radius: 10px;
        }

        /* --- SENİN AYARLADIĞIN DEĞERLER --- */
        .dice-area {
            position: absolute;
            width: 44px;
            height: 44px;
            top: 225px;   /* Senin verdiğin değer */
        }

        #dice-1 { left: 190px; } /* Senin verdiğin değer */
        #dice-2 { left: 272px; } /* Senin verdiğin değer */


        /* Nokta Görselleri */
        .dot {
            width: 11px;
            height: 12px;
            background-image: url('zar.png');
            background-size: cover;
            position: absolute;
            image-rendering: pixelated;
            display: none; /* Varsayılan olarak gizli, JS ile açıyoruz */
            opacity: 0.9;
        }

        /* Nokta Aralıkları */
        .p-1 { top: 4px; left: 4px; }
        .p-2 { top: 16px; left: 4px; }
        .p-3 { top: 28px; left: 4px; }
        .p-4 { top: 16px; left: 16.5px; }
        .p-5 { top: 4px; left: 29px; }
        .p-6 { top: 16px; left: 29px; }
        .p-7 { top: 28px; left: 29px; }


        #roll-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background-color: #4a5c4a;
            color: #dcdcdc;
            border: 4px solid #2e3b2e;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #232d23;
            transition: transform 0.1s;
        }

        #roll-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #232d23;
        }

        #roll-btn:disabled {
            background-color: #333;
            border-color: #222;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
            transform: translateY(4px);
        }

    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="table-bg">
            <div id="dice-1" class="dice-area">
                <div class="dot p-1"></div>
                <div class="dot p-2"></div>
                <div class="dot p-3"></div>
                <div class="dot p-4"></div>
                <div class="dot p-5"></div>
                <div class="dot p-6"></div>
                <div class="dot p-7"></div>
            </div>

            <div id="dice-2" class="dice-area">
                <div class="dot p-1"></div>
                <div class="dot p-2"></div>
                <div class="dot p-3"></div>
                <div class="dot p-4"></div>
                <div class="dot p-5"></div>
                <div class="dot p-6"></div>
                <div class="dot p-7"></div>
            </div>
        </div>
    </div>

    <button id="roll-btn" onclick="startGame()">OYNA</button>

    <script>
        const dotPatterns = {
            1: ['.p-4'],
            2: ['.p-1', '.p-7'], 
            3: ['.p-1', '.p-4', '.p-7'], 
            4: ['.p-1', '.p-5', '.p-3', '.p-7'], 
            5: ['.p-1', '.p-5', '.p-3', '.p-7', '.p-4'], 
            6: ['.p-1', '.p-2', '.p-3', '.p-5', '.p-6', '.p-7'] 
        };

        function showNumber(diceId, number) {
            const dice = document.getElementById(diceId);
            const dots = dice.querySelectorAll('.dot');
            dots.forEach(dot => dot.style.display = 'none');
            
            const pattern = dotPatterns[number];
            pattern.forEach(selector => {
                dice.querySelector(selector).style.display = 'block';
            });
        }

        function startGame() {
            const btn = document.getElementById('roll-btn');
            btn.disabled = true;
            btn.innerText = "ZARLAR ATILIYOR...";

            const interval = setInterval(() => {
                const rand1 = Math.floor(Math.random() * 6) + 1;
                const rand2 = Math.floor(Math.random() * 6) + 1;
                showNumber('dice-1', rand1);
                showNumber('dice-2', rand2);
            }, 100);

            setTimeout(() => {
                clearInterval(interval);
                const final1 = Math.floor(Math.random() * 6) + 1;
                const final2 = Math.floor(Math.random() * 6) + 1;
                showNumber('dice-1', final1);
                showNumber('dice-2', final2);
                btn.disabled = false;
                btn.innerText = "OYNA";
            }, 2000);
        }

        // --- SAYFA YÜKLENDİĞİNDE BURASI ÇALIŞIR ---
        // Başlangıçta 1-1 göster:
        showNumber('dice-1', 1);
        showNumber('dice-2', 1);

    </script>
</body>
</html>
